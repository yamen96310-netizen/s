name: Build PathMap APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java 17 ───────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install npm packages ───────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 6. Add Android platform ──────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      # ── 7. Sync web assets into Android ──────────────────
      - name: Sync assets
        run: npx cap sync android

      # ── 8. Build debug APK ───────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 9. Upload APK as artifact ─────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PathMap-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── 10. Print download reminder ──────────────────────
      - name: Done
        run: |
          echo "✅ Build complete!"
          echo "📥 Download the APK from the Artifacts section of this workflow run."
