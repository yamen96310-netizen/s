name: Build PathMap APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node.js ───────────────────────────────────────
      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 3. Java 17 ───────────────────────────────────────
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 4. Android SDK ───────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # ── 5. Install persistent debug keystore ─────────────
      #    This is the KEY step — using the same keystore every
      #    build means Android treats each new APK as an UPDATE,
      #    not a new app, so your data is never wiped.
      - name: Install persistent debug keystore
        run: |
          mkdir -p ~/.android
          cp debug.keystore ~/.android/debug.keystore
          echo "✅ Keystore installed — builds will be signed consistently"

      # ── 6. Install npm packages ───────────────────────────
      - name: Install dependencies
        run: npm install

      # ── 7. Add Android platform ──────────────────────────
      - name: Add Capacitor Android platform
        run: npx cap add android

      # ── 8. Sync web assets into Android ──────────────────
      - name: Sync assets
        run: npx cap sync android

      # ── 9. Build debug APK ───────────────────────────────
      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      # ── 10. Upload APK ────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PathMap-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Done
        run: |
          echo "✅ Build complete — APK signed with persistent keystore"
          echo "📥 Install this over your existing app without uninstalling"
          echo "💾 Your data will be preserved"
