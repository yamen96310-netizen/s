name: Generate Debug Keystore (run once)

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate persistent debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=PathMap Debug,O=PathMap,C=US"

      - name: Upload keystore
        uses: actions/upload-artifact@v4
        with:
          name: debug-keystore
          path: debug.keystore
          retention-days: 90

      - name: Done
        run: |
          echo "✅ Keystore generated!"
          echo "📥 Download it from the Artifacts section below."
          echo "👉 Then commit it to your repo root as 'debug.keystore' and delete this workflow file."
